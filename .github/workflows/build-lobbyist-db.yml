name: Build Lobbyist DB

on:
  schedule:
    # 8am UTC on the 1st and 15th of each month — catches mid-month OCL updates
    - cron: '0 8 1,15 * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    # To use your Mac instead (if GitHub-hosted runners are blocked):
    #   runs-on: self-hosted

    permissions:
      contents: write  # needed to create/update the GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Build lobby.db
        run: python -u lobbyist/build_db.py

      - name: Publish lobby.db to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete the existing release + tag if present, then recreate.
          # This keeps only the latest DB in the release (no history bloat).
          gh release delete db-latest --yes 2>/dev/null || true
          git push --delete origin db-latest 2>/dev/null || true
          gh release create db-latest lobbyist/lobby.db \
            --title "Latest Lobbyist DB" \
            --notes "Auto-built from lobbycanada.gc.ca open data on $(date -u +%Y-%m-%d)"

      - name: Trigger Render redeploy
        if: env.RENDER_DEPLOY_HOOK != ''
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: curl -s -X POST "$RENDER_DEPLOY_HOOK"
